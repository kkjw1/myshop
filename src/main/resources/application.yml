spring:

  data:
    redis:
      host: localhost
      port: 6379
      password: 9451

  config:
    import: optional:file:.env[.properties]

  messages:
    basename: messages,errors

  profiles:
    active: local

  datasource:
    url: jdbc:h2:tcp://localhost/~/myshop
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        # show_sql: true
        format_sql: true
#        use_sql_comments: true

logging.level:
  org.hibernate.SQL: debug
#  org.hibernate.type: trace

server:
  servlet:
    session:
      timeout: 6000   #세션 타임아웃 설정(기본:초)
      tracking-modes: cookie  #첫 로그인할 경우 jsessionid 404오류 해결


solapi:
  api-key: ${SOLAPI_API_KEY}
  api-secret: ${SOLAPI_API_SECRET}
  sender: ${SOLAPI_SENDER}