<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 재설정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7f9; }

        /* [중요] 이전 화면과 완전히 동일한 로고 및 컨테이너 설정 */
        .logo-wrapper {
            margin-bottom: 2.5rem;
            text-align: center;
        }
        .logo-text {
            font-size: 1.8rem;
            font-weight: 800;
            color: #333;
            letter-spacing: -1px;
            text-decoration: none;
        }

        /* 이전 화면의 auth-container와 크기(450px) 및 여백 동일하게 유지 */
        .auth-container {
            max-width: 450px;
            margin: 0 auto;
        }

        /* 이전 화면의 card shadow 및 padding(p-4) 동일 적용 */
        .card {
            border-radius: 12px;
            border: none;
        }

        .input-section {
            margin-top: 1.5rem;
        }

        /* 상태 메시지 스타일 */
        .status-msg {
            font-size: 0.8rem;
            margin-top: 5px;
            display: none;
        }
        .match { color: #0d6efd; }
        .no-match { color: #dc3545; }

        .input-error {
            border-color: #dc3545 !important;
            color: #dc3545;
        }
    </style>
</head>
<body>

<div class="container d-flex flex-column justify-content-center min-vh-100">
    <div class="logo-wrapper">
        <a href="/" class="logo-text">MY SHOPPING MALL</a>
    </div>

    <div class="auth-container">
            <form th:action="@{/resetPassword}" method="post" th:object="${resetPasswordMemberDto}">
                <div class="card shadow-sm p-4">
                    <h5 class="fw-bold">비밀번호 재설정</h5>

                    <p class="small text-muted mb-4 border-bottom pb-3">
                        <div style="font-weight: bold;">
                            아이디: <span th:text="*{id}"></span>
                            <input type="hidden" th:field="*{id}">
                        </div>
                        <br>본인 인증이 완료되었습니다.<br>새로운 비밀번호를 안전하게 설정해 주세요.
                    </p>

                <div class="text-danger" style="font-size: 0.875rem;" th:errors="*{password}">비밀번호 에러메시지</div>

                <label class="form-label small fw-bold">새 비밀번호</label>
                <div class="mb-3 input-group">
                    <input type="password" th:field="*{password}" th:errorclass="input-error" class="form-control"
                           placeholder="8자 이상의 비밀번호" required>
                    <span class="input-group-text eye-btn" id="toggleText" onclick="togglePassword()">보기</span>
                </div>

                <label class="form-label small fw-bold">비밀번호 확인</label>
                <div id="passwordMsg" class="status-msg mb-4 "></div>
                <div class="input-group mb-3">
                    <input type="password" id="confirmPassword" class="form-control"
                           placeholder="비밀번호를 한번 더 입력" required>
                    <span class="input-group-text eye-btn" id="toggleText2" onclick="togglePassword2()">보기</span>
                </div>

                <button type="submit" id="submitBtn" class="btn btn-primary w-100 py-2 fw-bold" disabled>
                    비밀번호 변경 완료
                </button>

                <div class="text-center mt-4 pt-3 border-top">
                    <a href="/login" th:href="@{/login}" class="text-secondary small text-decoration-none">로그인으로 돌아가기</a>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
    const pw = document.getElementById('password');
    const confPw = document.getElementById('confirmPassword');
    const msg = document.getElementById('passwordMsg');
    const btn = document.getElementById('submitBtn');


    function togglePassword() {
        pw.type = pw.type === 'password' ? 'text' : 'password';

        const toggleText = document.getElementById('toggleText');
        if (toggleText.textContent === "보기") {
            toggleText.textContent = "안보기";
        } else {
            toggleText.textContent = "보기";
        }
    }

    function togglePassword2() {
        confPw.type = confPw.type === 'password' ? 'text' : 'password';

        const toggleText = document.getElementById('toggleText2');
        if (toggleText.textContent === "보기") {
            toggleText.textContent = "안보기";
        } else {
            toggleText.textContent = "보기";
        }
    }


    function validate() {
        const p1 = pw.value;
        const p2 = confPw.value;

        if (p2.length === 0) {
            msg.style.display = 'none';
            btn.disabled = true;
            return;
        }

        msg.style.display = 'block';
        if (p1 === p2) {
            msg.textContent = '비밀번호가 일치합니다.';
            msg.className = 'status-msg match';
            btn.disabled = false;
            confPw.classList.remove("input-error");
        } else {
            msg.textContent = '비밀번호가 일치하지 않습니다.';
            msg.className = 'status-msg no-match';
            btn.disabled = true;
            confPw.classList.add("input-error");
        }
    }

    pw.addEventListener('input', validate);
    confPw.addEventListener('input', validate);
</script>

</body>
</html>
