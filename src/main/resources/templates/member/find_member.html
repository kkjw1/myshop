<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>아이디,비밀번호 찾기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .auth-card { cursor: pointer; transition: all 0.3s ease; border: 2px solid #f8f9fa; }
        .auth-card:hover { border-color: #0d6efd; background-color: #f8fbff; }
        .auth-card.active { border-color: #0d6efd; background-color: #f8fbff; box-shadow: 0 4px 10px rgba(13, 110, 253, 0.1); }
        .auth-icon { font-size: 1.5rem; color: #0d6efd; }
        .input-section { display: none; }
        .input-section.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .input-error {
            border-color: #dc3545 !important;
            color: #dc3545;
        }
        /* 로고 영역 스타일 */
        .logo-wrapper {
            margin-bottom: 2.5rem;
            text-align: center;
        }
        .logo-wrapper img {
            max-width: 180px; /* 로고 크기 조절 */
            height: auto;
        }
        .logo-text {
            font-size: 1.8rem;
            font-weight: 800;
            color: #333;
            letter-spacing: -1px;
            text-decoration: none;
        }
    </style>
</head>
<body class="bg-light">

<div class="container d-flex flex-column justify-content-center min-vh-100">
    <div class="logo-wrapper">
        <a href="/static" th:href="@{/static}" class="logo-text">
            MYSHOP
        </a>
    </div>

    <div class="auth-container">

    <div class="row justify-content-center">
        <div class="col-lg-7 col-md-9">
            <div class="card border-0 shadow-sm p-4">
                <div class="text-center mb-4">
                    <h3 class="fw-bold">아이디,비밀번호 찾기</h3>
                    <p class="text-muted">본인 확인을 위한 인증 방법을 선택해 주세요.</p>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-4">
                        <div class="card auth-card h-100 text-center p-3 active" onclick="selectMethod('phone')">
                            <i class="bi bi-phone auth-icon mb-2"></i>
                            <div class="small fw-bold">휴대폰</div>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="card auth-card h-100 text-center p-3" onclick="selectMethod('email')">
                            <i class="bi bi-envelope auth-icon mb-2"></i>
                            <div class="small fw-bold">이메일</div>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="card auth-card h-100 text-center p-3" onclick="selectMethod('integrated')">
                            <i class="bi bi-shield-check auth-icon mb-2"></i>
                            <div class="small fw-bold">통합인증</div>
                        </div>
                    </div>
                </div>

                <hr class="my-4 text-secondary opacity-25">

                <div id="phone-section" class="input-section active">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">휴대폰 번호 인증</label>
                        <div class="text-danger" style="font-size: 0.875rem;" id="phoneCheck"></div>
                        <div class="input-group">
                            <input type="text" class="form-control form-control-lg" id="phoneNumber" placeholder="010-XXXX-XXXX" oninput="formatPhoneNumber(this)">
                            <button class="btn btn-primary" type="button" id="sendSmsBtn" onclick="sendSmsAuth()">인증번호 받기</button>
                        </div>
                    </div>
                    <div class="text-danger" style="font-size: 0.875rem;" id="smsAuthMsg"></div>
                    <div class="mb-4 input-group">
                        <input type="text" class="form-control form-control-lg" id="smsAuthCode" placeholder="인증번호 6자리">
                        <span class="input-group-text text-danger" id="timer" style="display: none">03:00</span>
                    </div>
                    <button type="button" id="submit-btn1" class="btn btn-primary btn-lg w-100 py-3 mt-2" onclick="smsCheckAuthCode()" disabled>인증하기</button>
                </div>

                <div id="email-section" class="input-section">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">등록된 이메일 주소</label>
                        <div class="input-group">
                            <input type="email" class="form-control form-control-lg" placeholder="example@mail.com">
                            <button class="btn btn-primary" type="button">메일발송</button>
                        </div>
                    </div>
                    <div class="mb-4">
                        <input type="text" class="form-control form-control-lg" placeholder="인증코드 입력">
                    </div>
                    <button type="submit" id="submit-btn2" class="btn btn-primary btn-lg w-100 py-3 mt-2" onclick="checkAuthCode2()" disabled>인증하기</button>
                </div>

                <div id="integrated-section" class="input-section text-center py-3">
                    <div class="bg-light p-4 rounded-3 mb-4">
                        <p class="mb-0 text-dark">통신사 인증(PASS), 아이핀 등을 통해<br>가장 빠르고 안전하게 본인을 확인할 수 있습니다.</p>
                    </div>
                    <button class="btn btn-dark btn-lg w-100 py-3">본인 확인 서비스 시작</button>
                </div>

                <div class="text-center mt-4">
                    <a href="/login" th:href="@{/login}" class="text-decoration-none text-muted small">로그인으로 돌아가기</a>
                </div>
            </div>
        </div>
    </div>
</div>

</div>

<script>


    async function smsCheckAuthCode() {
        const authCode = document.getElementById('smsAuthCode').value;
        const phoneNumber = document.getElementById('phoneNumber').value;
        const msg = document.getElementById('smsAuthMsg');

        if (authCode === "") {
            alert("인증번호를 입력해주세요.");
            return;
        }

        const res = await fetch('/findMember/checkAuthCode', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({authCode: authCode, phoneNumber: phoneNumber}) // 본문에 담아 보냄
        });

        if (res.redirected) {
            // 리디렉션된 URL로 페이지를 이동, 이렇게 하면 redirect가 두 번 됨
            window.location.href = res.url;
        } else {
            msg.innerText = "인증번호가 일치하지 않습니다.";
        }
    }

    async function sendSmsAuth() {
        const phoneNumberVal = document.getElementById('phoneNumber').value;
        const phoneNumber = document.getElementById('phoneNumber');
        const msg = document.getElementById('phoneCheck');
        const submitBtn = document.getElementById('submit-btn1');

        if (!phoneNumberVal) {
            alert("핸드폰 번호를 입력해주세요.");
            return;
        }

        try {
            const checkPhoneNumber = await fetch(`checkPhoneNumber?phoneNumber=${phoneNumberVal}`);
            const isAvailable = await checkPhoneNumber.json();

            // 사용중인 번호
            if(isAvailable) {
                msg.innerText = "없는 번호입니다."
                phoneNumber.classList.add("input-error");
                return;
            } else {
                msg.innerText = "";
                phoneNumber.classList.remove("input-error");
            }

            const sendSmsAuth = await fetch('/sendSmsAuth',{
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ phoneNumber: phoneNumberVal }) // 본문에 담아 보냄
            });

            const sendSmsAuthText = await sendSmsAuth.text();

            if (sendSmsAuthText === "ok") {
                alert("인증번호가 발송되었습니다.");
                startTimer(180); // 180초
                submitBtn.disabled = false;
            } else {
                alert(`sendSmsAuthText:${sendSmsAuthText}`);
                throw new Error("인증번호 발송 실패");
            }

        } catch (err) {
            console.error("checkPhoneNumber Error:", err);
            alert("서버 통신 중 오류가 발생했습니다.");
        }
    }

    let timerInterval;

    function startTimer(duration) {
        let timer = duration, minutes, seconds;
        const display = document.getElementById('timer');
        const sendBtn = document.getElementById('sendSmsBtn');
        const submitBtn = document.getElementById('submit-btn1');

        display.style.display = 'block';
        // 기존 타이머가 있다면 초기화
        clearInterval(timerInterval);

        sendBtn.innerText = "재발송";

        timerInterval = setInterval(function () {
            minutes = parseInt(timer / 60, 10);
            seconds = parseInt(timer % 60, 10);

            minutes = minutes < 10 ? "0" + minutes : minutes;
            seconds = seconds < 10 ? "0" + seconds : seconds;

            display.textContent = minutes + ":" + seconds;

            if (--timer < 0) {
                clearInterval(timerInterval);
                display.textContent = "시간만료";
                alert("인증 시간이 만료되었습니다. 다시 시도해주세요.");
                submitBtn.disabled = true;
            }
        }, 1000);
    }


    function formatPhoneNumber(input) {
        // 1. 숫자만 남기기
        let value = input.value.replace(/[^0-9]/g, "");

        // 2. 길이에 따라 하이픈 삽입
        let result = "";
        if (value.length < 4) {
            result = value;
        } else if (value.length < 8) {
            result = value.replace(/(\d{3})(\d{1,4})/, "$1-$2");
        } else {
            result = value.replace(/(\d{3})(\d{3,4})(\d{4})/, "$1-$2-$3");
        }

        // 3. 값 반영
        input.value = result;
    }

    function selectMethod(method) {
        // 모든 카드에서 active 제거 및 클릭한 카드에 추가
        document.querySelectorAll('.auth-card').forEach(card => card.classList.remove('active'));
        event.currentTarget.classList.add('active');

        // 모든 섹션 숨기기
        document.querySelectorAll('.input-section').forEach(sec => sec.classList.remove('active'));

        // 선택한 섹션 보여주기
        const targetSection = document.getElementById(method + '-section');
        targetSection.classList.add('active');

        if(method === 'integrated') {
            submitBtn.style.display = 'none';
        } else {
            submitBtn.style.display = 'block';
        }
    }
</script>
</body>
</html>
