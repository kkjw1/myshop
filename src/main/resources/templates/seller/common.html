<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>



<th:block th:fragment="common_style">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</th:block>



<style th:fragment="sidebar_style">
    body {
        background-color: #f8f9fa; /* 밝은 배경색 */
    }
    .sidebar {
        background-color: #2c3e50; /* 다크 네이비 */
        min-height: 100vh;
        color: white;
        padding-top: 20px;
    }
    .sidebar .nav-link {
        color: #ecf0f1;
        padding: 15px 20px;
        font-size: 1.1rem;
        transition: background-color 0.3s;
    }
    .sidebar .nav-link.active-menu,
    .sidebar .nav-link:hover {
        background-color: #34495e;
        border-left: 5px solid #3498db;
        color: white;
    }
</style>




<th:block th:fragment="sidebar">
    <div class="sidebar d-none d-md-block" style="width: 250px;">
        <h3 class="text-center mb-4 text-white">📦 판매자 센터</h3>
        <nav class="nav flex-column">
            <a class="nav-link" href="home.html" th:href="@{/seller/item_manage}"><i class="fas fa-tachometer-alt me-2"></i> 대시보드</a>
            <a class="nav-link" href="item/item_manage.html" th:href="@{/seller/item_manage}"><i class="fas fa-box me-2"></i> 상품 관리</a>
            <a class="nav-link" href="delivery/order_delivery.html" th:href="@{/seller/order_delivery}"><i class="fas fa-shopping-cart me-2"></i> 주문/배송</a>
            <a class="nav-link" href="inquiry/inquiry_manage.html" th:href="@{/seller/inquiry_manage}"><i class="fas fa-comment-dots me-2"></i> 고객 문의</a>
            <a class="nav-link" href="../home/home.html" th:href="@{/}"><i class="fas fa-sign-out-alt me-2"></i> 로그아웃</a>
        </nav>
    </div>
</th:block>




<header th:fragment="header(text)" class="mb-4 d-flex justify-content-between align-items-center border-bottom pb-3">
    <h1 class="h3 mb-0 text-dark" th:text="${text}">판매자 대시보드</h1>
    <div class="text-secondary">
        <i class="fas fa-user-circle me-1"></i>[판매자]님, 환영합니다!
        <i class="fas me-1"></i> 로그아웃
    </div>
</header>



</body>
</html>
