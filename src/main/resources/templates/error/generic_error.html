<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - <span th:text="${code}">Code</span></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fdfdfe; display: flex; align-items: center; height: 100vh; font-family: 'Pretendard', sans-serif; }
        .error-card { max-width: 500px; margin: auto; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); background: white; text-align: center; }
        .error-code { font-size: 6rem; font-weight: 800; color: #212529; margin-bottom: 0; }
        .error-title { font-size: 1.8rem; font-weight: 700; color: #212529; margin-bottom: 15px; }
        .error-detail { color: #6c757d; margin-bottom: 30px; line-height: 1.6; }
        .btn-home { background-color: #0d6efd; border: none; padding: 12px 30px; border-radius: 10px; font-weight: 600; }
    </style>
</head>
<body>

<div class="error-card">
    <h1 class="error-code" th:text="${code}">500</h1>

    <h2 class="error-title" th:text="${message}">오류가 발생했습니다</h2>

    <p class="error-detail" th:text="${detail}">요청을 처리하는 중에 예상치 못한 문제가 발생했습니다.</p>

    <div class="d-grid gap-2">
        <a href="/" class="btn btn-primary btn-home" th:href="@{/}">홈으로 돌아가기</a>
        <button onclick="history.back()" class="btn btn-link text-decoration-none text-muted">이전 페이지로</button>
    </div>
</div>

</body>
</html>
